services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    env_file:
      - .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      APP_NAME: ${APP_NAME}
      API_PORT: ${API_PORT}
      API_GLOBAL_PREFIX: ${API_GLOBAL_PREFIX}
      API_VERSION: ${API_VERSION}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER}
      SWAGGER_PATH: ${SWAGGER_PATH}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      NX_DAEMON: 'false'
    command: ['pnpm', 'exec', 'nx', 'dev', 'api']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3333/api/v1/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - '${API_PORT:-3333}:3333'
    volumes:
      - .:/workspace
      - workspace-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store
      - api-nx-state:/workspace/.nx

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      NX_DAEMON: 'false'
    command:
      [
        'pnpm',
        'exec',
        'nx',
        'dev',
        'web',
        '--hostname',
        '0.0.0.0',
        '--port',
        '3000',
      ]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    ports:
      - '${WEB_PORT:-3000}:3000'
    volumes:
      - .:/workspace
      - workspace-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store
      - web-next-cache:/workspace/apps/web/.next
      - web-nx-state:/workspace/.nx

volumes:
  postgres-data:
  minio-data:
  pnpm-store:
  web-next-cache:
  workspace-node-modules:
  api-nx-state:
  web-nx-state:
